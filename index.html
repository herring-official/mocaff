<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOCAFF | OFFICIAL</title>
    <style>
        /* 1. 스크롤 방지 및 전체 화면 설정 */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Apple SD Gothic Neo', sans-serif; }
        body { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .wrapper { width: 100%; max-width: 1000px; display: flex; flex-direction: column; align-items: center; }
        
        /* 2. 상단 헤더 */
        .header { text-align: center; margin-bottom: 30px; }
        .logo { font-size: 1.6rem; letter-spacing: 10px; color: #d4af37; font-weight: bold; margin-bottom: 8px; }
        .txt1 { font-size: 0.95rem; opacity: 0.8; margin-bottom: 4px; }
        .txt2 { font-size: 1.1rem; color: #d4af37; font-weight: 600; }
        
        /* 3. 쇼케이스 (간격을 기존 15px에서 40px로 대폭 확대) */
        .showcase { display: flex; flex-direction: row; gap: 40px; width: 100%; justify-content: center; align-items: flex-start; }
        
        .card { flex: 1; max-width: 420px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        
        /* 4. 미디어 박스 (이미지가 잘리지 않도록 object-fit: contain 적용 및 여백 추가) */
        .media-box { 
            width: 100%; 
            aspect-ratio: 1.6 / 1; 
            border-radius: 20px !important; 
            background: #080808; /* 잘리는 부분 방지를 위한 배경색 */
            object-fit: contain; /* 이미지가 잘리지 않고 전체가 다 보이게 설정 */
            border: 1.5px solid rgba(212,175,55,0.3); 
            box-shadow: 0 0 25px rgba(212,175,55,0.15);
            padding: 5px; /* 내부 여백을 주어 테두리에 딱 붙지 않게 함 */
            box-sizing: border-box;
        }
        
        .cap { font-size: 0.85rem; margin-top: 15px; font-weight: 500; letter-spacing: -0.5px; }
        .btn { display: inline-block; margin-top: 15px; padding: 10px 30px; border: 1px solid #d4af37; color: #d4af37; text-decoration: none; border-radius: 50px; font-size: 0.85rem; font-weight: 600; transition: 0.3s; }
        .btn:hover { background: #d4af37; color: #000; }
        
        /* 5. 푸터 */
        .footer { margin-top: 40px; font-size: 0.75rem; color: #444; text-align: center; line-height: 1.6; }

        /* 모바일 대응 (간격 조정) */
        @media (max-width: 768px) {
            .showcase { flex-direction: column; align-items: center; gap: 25px; }
            .card { width: 90%; }
            .media-box { aspect-ratio: 1.6 / 1; }
            .footer { margin-top: 25px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="header">
            <div class="logo">MOCAFF</div>
            <div class="txt1">커피 생태계의 진정한 가치를 연결합니다.</div>
            <div class="txt2">3월 25일, 그 가치를 경험하세요.</div>
        </div>

        <div class="showcase">
            <div class="card">
                <video class="media-box" autoplay muted loop playsinline>
                    <source src="mocaff_badge.mp4" type="video/mp4">
                </video>
                <div class="cap">MOCAFF VVIP BADGE</div>
            </div>
            
            <div class="card">
                <img src="nft_badge.jpg" alt="NFT" class="media-box" style="border-color: rgba(255,182,193,0.3);">
                <div class="cap">SPRING COFFEE CONCERT</div>
                <a href="https://opensea.io/assets/polygon/0x0172a6ace69916736e395c750fccce5305e726ac/0" target="_blank" class="btn">OWN THE VALUE</a>
            </div>
        </div>

        <div class="footer">
            herring@mocaff.kr<br>
            서울특별시 마포구 서강로 75-16 로비층 HERRING
        </div>
    </div>
</body>
</html>
