<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOCAFF | OFFICIAL</title>
    <style>
        /* 1. 스크롤 절대 방지 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; color: #fff; font-family: 'Apple SD Gothic Neo', sans-serif; }
        
        body { display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 10px 0; }

        .container { text-align: center; width: 95%; max-width: 1000px; }
        
        /* 2. 헤더 */
        .logo { font-size: 1.6rem; letter-spacing: 10px; margin-bottom: 8px; color: #d4af37; font-weight: bold; }
        .main-text { font-size: 0.95rem; color: #fff; opacity: 0.8; margin-bottom: 4px; }
        .sub-text { font-size: 1.05rem; color: #d4af37; font-weight: 600; margin-bottom: 20px; }
        
        /* 3. [핵심] 가로가 긴 라운드 직사각형 (카드형) */
        .showcase { display: flex; flex-direction: row; justify-content: center; align-items: center; gap: 20px; width: 100%; }
        
        .media-item { flex: 1; max-width: 450px; }
        
        /* border-radius를 20px로 줄여서 확실히 직사각형으로 보이게 함 */
        .media-content { 
            width: 100%; 
            aspect-ratio: 1.7 / 1 !important; /* 가로를 더 길게 강제 설정 */
            border-radius: 20px !important;  /* 50%가 아니므로 이제 원이 아닙니다! */
            object-fit: cover; 
            display: block;
        }
        
        .hero-video { border: 1.5px solid rgba(212,175,55,0.4); box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        .nft-image { border: 1.5px solid rgba(255,182,193,0.4); box-shadow: 0 0 20px rgba(255,182,193,0.2); }
        
        .media-caption { font-size: 0.85rem; color: #fff; margin-top: 12px; font-weight: 500; letter-spacing: -0.5px; opacity: 0.9; }
        
        /* 4. 오픈씨 버튼 */
        .opensea-btn { display: inline-block; padding: 8px 25px; border: 1px solid #d4af37; color: #d4af37; text-decoration: none; border-radius: 50px; font-size: 0.8rem; font-weight: 600; margin-top: 15px; transition: 0.3s; }
        .opensea-btn:hover { background: #d4af37; color: #000; }
        
        /* 5. 푸터 */
        .footer { font-size: 0.7rem; color: #444; line-height: 1.5; padding-bottom: 10px; }
        .footer a { color: #444; text-decoration: none; }

        /* 모바일 최적화 */
        @media (max-width: 768px) {
            .showcase { flex-direction: column; gap: 15px; }
            .media-item { width: 90%; }
            .media-content { aspect-ratio: 1.7 / 1 !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">MOCAFF</div>
        <div class="main-text">커피 생태계의 진정한 가치를 연결합니다.</div>
        <div class="sub-text">3월 25일, 그 가치를 경험하세요.</div>

        <div class="showcase">
            <div class="media-item">
                <video class="media-content hero-video" autoplay muted loop playsinline>
                    <source src="mocaff_badge.mp4" type="video/mp4">
                </video>
                <div class="media-caption">MOCAFF VVIP BADGE</div>
            </div>
            
            <div class="media-item">
                <img src="nft_badge.jpg" alt="Spring Coffee Concert NFT" class="media-content nft-image">
                <div class="media-caption">SPRING COFFEE CONCERT</div>
                <a href="https://opensea.io/assets/polygon/0x0172a6ace69916736e395c750fccce5305e726ac/0" target="_blank" class="opensea-btn">OWN THE VALUE</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="mailto:herring@mocaff.kr">herring@mocaff.kr</a><br>
        <address style="font-style: normal;">서울특별시 마포구 서강로 75-16 로비층 HERRING</address>
    </div>
</body>
</html>
