<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOCAFF | OFFICIAL</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { text-align: center; width: 90%; max-width: 600px; padding: 60px 0; }
        
        /* 로고 & 영상 섹션 */
        .logo { font-size: 2rem; letter-spacing: 10px; margin-bottom: 30px; color: #d4af37; font-weight: bold; }
        .hero-video { width: 100%; max-width: 380px; border-radius: 20px; box-shadow: 0 0 50px rgba(212,175,55,0.3); margin-bottom: 40px; }
        
        /* 비전 문구 */
        .main-text { font-size: 1.25rem; color: #fff; font-weight: 400; margin-bottom: 12px; letter-spacing: -0.5px; }
        .sub-text { font-size: 1.4rem; color: #d4af37; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 60px; }
        
        /* NFT 전시 섹션 */
        .nft-card { background: rgba(255,255,255,0.05); padding: 40px 20px; border-radius: 30px; border: 1px solid rgba(212,175,55,0.2); margin-top: 20px; }
        .nft-image { width: 220px; height: 220px; border-radius: 50%; object-fit: cover; box-shadow: 0 0 30px rgba(255,182,193,0.3); margin-bottom: 25px; border: 2px solid rgba(212,175,55,0.3); }
        .nft-title { font-size: 1.1rem; color: #fff; margin-bottom: 8px; font-weight: 500; }
        .nft-desc { font-size: 0.9rem; color: #aaa; line-height: 1.6; margin-bottom: 25px; }
        
        /* 버튼 디자인 */
        .opensea-btn { display: inline-block; padding: 15px 40px; border: 1px solid #d4af37; color: #d4af37; text-decoration: none; border-radius: 50px; font-size: 0.95rem; font-weight: 600; transition: all 0.3s ease; }
        .opensea-btn:hover { background: #d4af37; color: #000; box-shadow: 0 0 20px rgba(212,175,55,0.5); }
        
        /* 하단 정보 */
        .footer { margin-top: auto; padding: 40px 0; text-align: center; font-size: 0.8rem; color: #555; line-height: 1.8; }
        .footer a { color: #555; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">MOCAFF</div>
        
        <video class="hero-video" autoplay muted loop playsinline>
            <source src="mocaff_badge.mp4" type="video/mp4">
        </video>
        
        <div class="main-text">커피 생태계의 진정한 가치를 연결합니다.</div>
        <div class="sub-text">3월 25일, 그 가치를 경험하세요.</div>
        
        <div class="nft-card">
            <img src="nft_badge.jpg" alt="Spring Coffee Concert NFT" class="nft-image">
            <div class="nft-title">2026 SPRING COFFEE CONCERT</div>
            <p class="nft-desc">한정판 VVIP NFT 뱃지를 소장하고<br>MOCAFF가 선사하는 특별한 혜택을 누리세요.</p>
            <a href="https://opensea.io/assets/polygon/0x0172a6ace69916736e395c750fccce5305e726ac/0" target="_blank" class="opensea-btn">OWN THE VALUE (OpenSea)</a>
        </div>
    </div>

    <div class="footer">
        <a href="mailto:herring@mocaff.kr">herring@mocaff.kr</a><br>
        <address style="font-style: normal;">서울특별시 마포구 서강로 75-16 로비층 HERRING</address>
    </div>
</body>
</html>
