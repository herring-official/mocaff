<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOCAFF | 모카프</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #000; font-family: 'Apple SD Gothic Neo', sans-serif; color: #fff; overflow: hidden; }
        .container { text-align: center; width: 100%; max-width: 500px; padding: 20px; }
        .logo { font-size: 2rem; font-weight: bold; color: #d4af37; letter-spacing: 8px; margin-bottom: 30px; }
        .video-container { width: 100%; border-radius: 20px; overflow: hidden; box-shadow: 0 0 50px rgba(212, 175, 55, 0.3); margin-bottom: 30px; background: #000; }
        video { width: 100%; display: block; outline: none; border: none; }
        h1 { font-weight: 300; font-size: 1.2rem; line-height: 1.8; color: #ccc; }
        .btn { display: inline-block; margin-top: 30px; padding: 15px 40px; border: 1px solid #d4af37; color: #d4af37; text-decoration: none; border-radius: 50px; font-size: 0.9rem; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">MOCAFF</div>
        <div class="video-container">
            <video preload="auto" autoplay muted loop playsinline>
                <source src="mocaff_badge.mp4" type="video/mp4">
            </video>
        </div>
        <h1>참 오랜만이죠?<br>MOCAFF의 새로운 시작을 소장하세요.</h1>
        <a href="#" class="btn">VVIP 뱃지 확인하기</a>
    </div>
</body>
</html>
