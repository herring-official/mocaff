<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOCAFF | OFFICIAL</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { text-align: center; width: 90%; max-width: 1000px; padding: 60px 0; display: flex; flex-direction: column; align-items: center; }
        
        /* 로고 & 비전 문구 */
        .logo { font-size: 2.2rem; letter-spacing: 12px; margin-bottom: 25px; color: #d4af37; font-weight: bold; }
        .main-text { font-size: 1.25rem; color: #fff; font-weight: 400; margin-bottom: 12px; letter-spacing: -0.5px; opacity: 0.9; }
        .sub-text { font-size: 1.4rem; color: #d4af37; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 70px; }
        
        /* [핵심] 좌우 대칭 레이아웃 */
        .showcase { display: flex; flex-direction: row; justify-content: center; align-items: flex-start; gap: 60px; width: 100%; margin-bottom: 80px; }
        
        /* 미디어 아이템 공통 스타일 (영상 & NFT 이미지) */
        .media-item { flex: 1; max-width: 420px; display: flex; flex-direction: column; align-items: center; }
        .media-content { width: 100%; aspect-ratio: 1 / 1; border-radius: 50%; object-fit: cover; transition: all 0.3s ease; }
        
        /* 왼쪽: 금빛 영상 디테일 */
        .hero-video { border: 2px solid rgba(212,175,55,0.3); box-shadow: 0 0 50px rgba(212,175,55,0.3); }
        
        /* 오른쪽: NFT 핑크 골드 뱃지 디테일 */
        .nft-image { border: 2px solid rgba(255,182,193,0.3); box-shadow: 0 0 50px rgba(255,182,193,0.3); }
        
        /* 미디어 캡션 */
        .media-caption { font-size: 1.1rem; color: #fff; margin-top: 25px; font-weight: 500; letter-spacing: -0.5px; }
        .media-desc { font-size: 0.9rem; color: #aaa; line-height: 1.6; margin-top: 10px; margin-bottom: 30px; }

        /* 오픈씨 버튼 */
        .opensea-btn { display: inline-block; padding: 15px 40px; border: 1px solid #d4af37; color: #d4af37; text-decoration: none; border-radius: 50px; font-size: 0.95rem; font-weight: 600; transition: all 0.3s ease; }
        .opensea-btn:hover { background: #d4af37; color: #000; box-shadow: 0 0 20px rgba(212,175,55,0.5); }
        
        /* 하단 정보 */
        .footer { margin-top: auto; padding: 50px 0; text-align: center; font-size: 0.85rem; color: #555; line-height: 1.8; }
        .footer a { color: #555; text-decoration: none; }

        /* [모바일 최적화] 화면이 좁아지면 위아래로 배치 */
        @media (max-width: 768px) {
            .showcase { flex-direction: column; align-items: center; gap: 50px; }
            .media-item { width: 100%; max-width: 350px; }
            .logo { font-size: 1.8rem; letter-spacing: 8px; }
            .main-text { font-size: 1.1rem; }
            .sub-text { font-size: 1.2rem; margin-bottom: 60px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">MOCAFF</div>
        <div class="main-text">커피 생태계의 진정한 가치를 연결합니다.</div>
        <div class="sub-text">3월 25일, 그 가치를 경험하세요.</div>
        
        <div class="showcase">
            <div class="media-item">
                <video class="media-content hero-video" autoplay muted loop playsinline>
                    <source src="mocaff_badge.mp4" type="video/mp4">
                </video>
                <div class="media-caption">MOCAFF VVIP BADGE</div>
                <div class="media-desc">디지털 제국의 위용을 상징하는 무한 동력의 골드 뱃지.</div>
            </div>
            
            <div class="media-item">
                <img src="nft_badge.jpg" alt="Spring Coffee Concert NFT" class="media-content nft-image">
                <div class="media-caption">SPRING COFFEE CONCERT</div>
                <div class="media-desc">커피와 예술의 만남, 그 소장 가치를 OpenSea에서 확인하세요.</div>
                <a href="https://opensea.io/assets/polygon/0x0172a6ace69916736e395c750fccce5305e726ac/0" target="_blank" class="opensea-btn">OWN THE VALUE (OpenSea)</a>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="mailto:herring@mocaff.kr">herring@mocaff.kr</a><br>
        <address style="font-style: normal;">서울특별시 마포구 서강로 75-16 로비층 HERRING</address>
    </div>
</body>
</html>
